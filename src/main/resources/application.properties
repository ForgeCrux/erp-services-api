server.port=8080
spring.jackson.date-format=com.probestack.forgestudio.design.RFC3339DateFormat
spring.jackson.serialization.WRITE_DATES_AS_TIMESTAMPS=false
#################################################
## Database connection configuration
#################################################
spring.data.mongodb.uri=mongodb+srv://ms-generator_user:sBAxTWcjqGEQnBVV@ms-generator.zkcrgua.mongodb.net/ps-code-generator-db?appName=ms-generator

# ===== OAuth2 / JWT Security =====
app.security.oauth2.mode=${APP_SECURITY_OAUTH2_MODE:SELF_CONTAINED}
app.security.oauth2.issuer-uri=${APP_SECURITY_OAUTH2_ISSUER_URI:http://localhost:8080}
app.security.oauth2.audience=${APP_SECURITY_OAUTH2_AUDIENCE:erp-services-api}
app.security.oauth2.client-id=${APP_SECURITY_OAUTH2_CLIENT_ID:generated-service-client}
app.security.oauth2.client-secret=${APP_SECURITY_OAUTH2_CLIENT_SECRET:change-me}
app.security.oauth2.default-scopes=${APP_SECURITY_OAUTH2_DEFAULT_SCOPES:api.read,api.write}
app.security.oauth2.token-ttl-seconds=${APP_SECURITY_OAUTH2_TOKEN_TTL_SECONDS:3600}
app.security.oauth2.key-strategy=${APP_SECURITY_OAUTH2_KEY_STRATEGY:GENERATED_ON_STARTUP}
app.security.oauth2.rsa.private-key-pem=${APP_SECURITY_OAUTH2_RSA_PRIVATE_KEY_PEM:}
app.security.oauth2.rsa.public-key-pem=${APP_SECURITY_OAUTH2_RSA_PUBLIC_KEY_PEM:}
app.security.oauth2.rsa.key-id=${APP_SECURITY_OAUTH2_RSA_KEY_ID:generated-dev-key}


# ===== Configurable Request Validation =====
# Disabled by default so generated scaffold APIs are easy to test locally.
# Set APP_VALIDATION_ENABLED=true to enforce generated request validation.
app.validation.enabled=${APP_VALIDATION_ENABLED:false}


# ===== Exception Handling =====
# Included because frameworkOptions.exceptionHandling=true was selected.
app.exception.include-system-message=${APP_EXCEPTION_INCLUDE_SYSTEM_MESSAGE:true}
app.exception.include-stacktrace=${APP_EXCEPTION_INCLUDE_STACKTRACE:false}
app.exception.include-correlation-id=${APP_EXCEPTION_INCLUDE_CORRELATION_ID:true}


# ===== HTTP Logging =====
# Logging is included because frameworkOptions.enterpriseLogging=true was selected.
# All behavior is controlled by configuration so developers can change logging without regenerating code.
app.logging.enabled=${APP_LOGGING_ENABLED:true}
app.logging.provider=${APP_LOGGING_PROVIDER:CONSOLE}
app.logging.structured=${APP_LOGGING_STRUCTURED:true}
app.logging.service-name=${APP_LOGGING_SERVICE_NAME:erp-services-api}
app.logging.service-version=${APP_LOGGING_SERVICE_VERSION:1.0.0}
app.logging.environment=${APP_LOGGING_ENVIRONMENT:local}
app.logging.correlation-header=${APP_LOGGING_CORRELATION_HEADER:X-Correlation-ID}
app.logging.max-body-size-bytes=${APP_LOGGING_MAX_BODY_SIZE_BYTES:8192}
app.logging.destination=${APP_LOGGING_DESTINATION:CONSOLE}

# File logging is used when destination is FILE or CONSOLE_AND_FILE.
# The generated app writes under the local repository logs directory by default.
app.logging.file.path=${APP_LOGGING_FILE_PATH:logs}
app.logging.file.name=${APP_LOGGING_FILE_NAME:application.log}
app.logging.file.max-size=${APP_LOGGING_FILE_MAX_SIZE:10MB}
app.logging.file.max-history=${APP_LOGGING_FILE_MAX_HISTORY:7}

# Request metadata logging is enabled by default.
app.logging.request.enabled=${APP_LOGGING_REQUEST_ENABLED:true}
app.logging.request.query-enabled=${APP_LOGGING_REQUEST_QUERY_ENABLED:true}
app.logging.request.client-ip-enabled=${APP_LOGGING_REQUEST_CLIENT_IP_ENABLED:true}
app.logging.request.user-agent-enabled=${APP_LOGGING_REQUEST_USER_AGENT_ENABLED:true}
app.logging.request.body-enabled=${APP_LOGGING_REQUEST_BODY_ENABLED:false}

# Response logging is disabled by default to avoid accidental sensitive-data logging.
app.logging.response.enabled=${APP_LOGGING_RESPONSE_ENABLED:false}
app.logging.response.body-enabled=${APP_LOGGING_RESPONSE_BODY_ENABLED:false}

# Headers can be useful for diagnostics, but sensitive values are masked by default.
app.logging.headers.enabled=${APP_LOGGING_HEADERS_ENABLED:true}
app.logging.masking.enabled=${APP_LOGGING_MASKING_ENABLED:true}
app.logging.masking.fields=${APP_LOGGING_MASKING_FIELDS:authorization,cookie,set-cookie,password,token,secret,apikey,api-key,clientsecret,client-secret}

# Business operation logging writes one summary event per generated service operation.
app.logging.business.enabled=${APP_LOGGING_BUSINESS_ENABLED:true}

